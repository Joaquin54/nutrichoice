services:
  - type: web
    name: nutrichoice-backend
    runtime: python
    plan: free
    region: virginia
    branch: main
    rootDir: backend
    healthCheckPath: /api/health/
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn server.wsgi:application --workers 2 --threads 4 --worker-class gthread --timeout 60 --bind 0.0.0.0:$PORT --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: nutrichoice-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://nutrichoice-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://nutrichoice-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://nutrichoice-frontend.onrender.com
      - key: SUPABASE_DB_NAME
        sync: false
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: SUPABASE_DB_HOST
        sync: false
      - key: SUPABASE_DB_PORT
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  - type: web
    name: nutrichoice-frontend
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nutrichoice-backend.onrender.com
